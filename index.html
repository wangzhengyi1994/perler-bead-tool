<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>拼豆色彩助手</title>
<link href="https://fonts.googleapis.com/css2?family=Zpix&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --px:3px;
  --black:#1a2e1a;
  --white:#fff;
  --bg:#6AB55E;--bg-d:#5A9E50;--bg-dd:#4A8B42;
  --surface:#fff;
  --purple:#9b72cf;--purple-l:#b794f6;--purple-d:#7b52af;--purple-dd:#5e3a8c;
  --pink:#f472b6;--pink-l:#f9a8d4;--pink-d:#d44a94;
  --yellow:#fbbf24;--yellow-l:#fcd34d;--yellow-d:#e09e00;
  --blue:#60a5fa;--blue-l:#93c5fd;--blue-d:#3b82d6;
  --green:#4ade80;--green-l:#86efac;--green-d:#22c55e;
  --red:#f87171;--red-l:#fca5a5;--red-d:#dc2626;
  --cyan:#67e8f9;--cyan-l:#a5f3fc;--cyan-d:#22bdd8;
  --orange:#fb923c;--orange-l:#fdba74;--orange-d:#e07020;--orange-dd:#b85a18;
  --olive:#9AB030;--olive-d:#849A28;--olive-dd:#6E8420;
  --gray-face:#B0B0B0;--gray-face-d:#909090;--gray-face-dd:#707070;
  --text:#2e1f0a;--text2:#7a6545;--text3:#a0926a;
  --font:'Zpix',monospace;
  --body:system-ui,-apple-system,'PingFang SC',sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html{font-size:15px;-webkit-tap-highlight-color:transparent}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100dvh;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100dvh;position:relative;overflow:hidden;background:var(--bg)}
@media(min-width:520px){.app{max-width:420px;margin-top:20px;margin-bottom:20px;min-height:calc(100dvh - 40px);border-radius:24px;box-shadow:0 8px 40px rgba(0,0,0,.2),0 0 0 3px var(--black);overflow:hidden}}
@media(min-width:520px){body{background:#3d6b38}}

/* Checker overlay */
.app::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.06;
  background-image:repeating-conic-gradient(rgba(255,255,255,.5) 0% 25%,transparent 0% 50%);
  background-size:16px 16px}

/* Pixel clip paths */
.rect-clip{clip-path:polygon(6px 0,calc(100% - 6px) 0,calc(100% - 6px) 3px,calc(100% - 3px) 3px,calc(100% - 3px) 6px,100% 6px,100% calc(100% - 6px),calc(100% - 3px) calc(100% - 6px),calc(100% - 3px) calc(100% - 3px),calc(100% - 6px) calc(100% - 3px),calc(100% - 6px) 100%,6px 100%,6px calc(100% - 3px),3px calc(100% - 3px),3px calc(100% - 6px),0 calc(100% - 6px),0 6px,3px 6px,3px 3px,6px 3px)}
.rect-border{position:absolute;inset:0;background:var(--black);z-index:0;
  clip-path:polygon(6px 0,calc(100% - 6px) 0,calc(100% - 6px) 3px,calc(100% - 3px) 3px,calc(100% - 3px) 6px,100% 6px,100% calc(100% - 6px),calc(100% - 3px) calc(100% - 6px),calc(100% - 3px) calc(100% - 3px),calc(100% - 6px) calc(100% - 3px),calc(100% - 6px) 100%,6px 100%,6px calc(100% - 3px),3px calc(100% - 3px),3px calc(100% - 6px),0 calc(100% - 6px),0 6px,3px 6px,3px 3px,6px 3px)}
.pill-border{position:absolute;inset:0;background:var(--black);z-index:0;
  clip-path:polygon(10px 0,calc(100% - 10px) 0,calc(100% - 10px) 2px,calc(100% - 6px) 2px,calc(100% - 6px) 4px,calc(100% - 4px) 4px,calc(100% - 4px) 6px,calc(100% - 2px) 6px,calc(100% - 2px) 10px,100% 10px,100% calc(100% - 10px),calc(100% - 2px) calc(100% - 10px),calc(100% - 2px) calc(100% - 6px),calc(100% - 4px) calc(100% - 6px),calc(100% - 4px) calc(100% - 4px),calc(100% - 6px) calc(100% - 4px),calc(100% - 6px) calc(100% - 2px),calc(100% - 10px) calc(100% - 2px),calc(100% - 10px) 100%,10px 100%,10px calc(100% - 2px),6px calc(100% - 2px),6px calc(100% - 4px),4px calc(100% - 4px),4px calc(100% - 6px),2px calc(100% - 6px),2px calc(100% - 10px),0 calc(100% - 10px),0 10px,2px 10px,2px 6px,4px 6px,4px 4px,6px 4px,6px 2px,10px 2px)}
.pill-clip{clip-path:polygon(10px 0,calc(100% - 10px) 0,calc(100% - 10px) 2px,calc(100% - 6px) 2px,calc(100% - 6px) 4px,calc(100% - 4px) 4px,calc(100% - 4px) 6px,calc(100% - 2px) 6px,calc(100% - 2px) 10px,100% 10px,100% calc(100% - 10px),calc(100% - 2px) calc(100% - 10px),calc(100% - 2px) calc(100% - 6px),calc(100% - 4px) calc(100% - 6px),calc(100% - 4px) calc(100% - 4px),calc(100% - 6px) calc(100% - 4px),calc(100% - 6px) calc(100% - 2px),calc(100% - 10px) calc(100% - 2px),calc(100% - 10px) 100%,10px 100%,10px calc(100% - 2px),6px calc(100% - 2px),6px calc(100% - 4px),4px calc(100% - 4px),4px calc(100% - 6px),2px calc(100% - 6px),2px calc(100% - 10px),0 calc(100% - 10px),0 10px,2px 10px,2px 6px,4px 6px,4px 4px,6px 4px,6px 2px,10px 2px)}

/* ═══ Pages ═══ */
.page{display:none;position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;z-index:1;-webkit-overflow-scrolling:touch}
.page.active{display:flex;flex-direction:column;z-index:2}
.page.slide-in{animation:pgIn .25s cubic-bezier(.22,.68,0,1) forwards}
.page.slide-out{animation:pgOut .2s ease-in forwards}
@keyframes pgIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes pgOut{from{transform:translateX(0)}to{transform:translateX(-30%);opacity:0}}

/* ═══ Header ═══ */
.hd{padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;background:var(--bg)}
.hd-title{flex:1;font-family:var(--font);font-size:.82rem;color:var(--white);text-shadow:2px 2px 0 rgba(0,0,0,.2)}
.hd-back{height:32px;padding:0 14px;border:var(--px) solid var(--black);cursor:pointer;font-family:var(--font);font-size:.55rem;color:var(--white);
  background:linear-gradient(180deg,var(--blue-l),var(--blue),var(--blue-d));position:relative;text-shadow:1px 1px 0 rgba(0,0,0,.2)}
.hd-back::before{content:'';position:absolute;top:3px;left:5px;width:8px;height:3px;background:rgba(255,255,255,.4)}
.hd-back:active{transform:scale(.93)}
.hd-back:hover{filter:brightness(1.1)}
.pbtn:hover{transform:translateY(-1px);filter:brightness(1.06)}
.r-btn:hover{filter:brightness(1.08)}
.c-bar-btn:hover{filter:brightness(1.08)}
.c-cell:hover{transform:scale(1.08);z-index:2}
.hd-right{font-family:var(--font);font-size:.55rem;padding:5px 14px;cursor:pointer;
  background:linear-gradient(180deg,var(--yellow-l),var(--yellow),var(--yellow-d));
  border:var(--px) solid var(--black);color:var(--black);position:relative}
.hd-right::before{content:'';position:absolute;top:2px;left:4px;width:6px;height:2px;background:rgba(255,255,255,.35)}

/* ═══════════════════════════════
   HOME PAGE - GAME ZONE STYLE
   ═══════════════════════════════ */
.home{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100dvh;padding:0 24px;position:relative;z-index:1}

/* Checker border strips */
.checker-top,.checker-bot{position:absolute;left:0;right:0;height:16px;z-index:2;
  background:repeating-conic-gradient(var(--bg-dd) 0% 25%,var(--bg-d) 0% 50%);background-size:16px 16px}
.checker-top{top:0}
.checker-bot{bottom:0}

/* Title */
.home-title{font-family:var(--font);font-size:1.3rem;color:var(--white);text-align:center;
  text-shadow:3px 3px 0 rgba(0,0,0,.25),-1px -1px 0 rgba(255,255,255,.1);
  margin-bottom:32px;letter-spacing:2px;position:relative;z-index:3}
.home-sub{font-family:var(--font);font-size:.42rem;color:rgba(255,255,255,.5);
  letter-spacing:4px;margin-top:6px;display:block}

/* ═══ 3D ISOMETRIC CUBE ═══ */
.cube-container{position:relative;width:160px;height:190px;margin:0 auto 36px;z-index:3}
/* Top face - pink */
.cube-top{position:absolute;width:160px;height:95px;top:0;left:0;
  background:linear-gradient(180deg,var(--pink-l),#F2A0B0,var(--pink-d));
  clip-path:polygon(50% 0%,100% 28%,50% 56%,0% 28%);
  display:flex;align-items:center;justify-content:center}
.cube-top::after{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:16px;height:5px;background:rgba(255,255,255,.4);
  clip-path:polygon(15% 0,100% 0,85% 100%,0 100%)}
/* Left face - navy/dark blue */
.cube-left{position:absolute;width:80px;height:120px;top:52px;left:0;
  background:linear-gradient(180deg,var(--gray-face),var(--gray-face-d),var(--gray-face-dd));
  clip-path:polygon(0% 22%,100% 0%,100% 78%,0% 100%)}
/* Right face - teal/cyan */
.cube-right{position:absolute;width:80px;height:120px;top:52px;left:80px;
  background:linear-gradient(180deg,var(--olive),var(--olive-d),var(--olive-dd));
  clip-path:polygon(0% 0%,100% 22%,100% 100%,0% 78%)}
/* Face icons */
.cube-icon{position:absolute;display:flex;align-items:center;justify-content:center;
  font-family:var(--font);font-size:.8rem;color:rgba(255,255,255,.85);text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.ci-top{top:14px;left:50%;transform:translateX(-50%);width:40px;height:30px}
.ci-left{top:80px;left:18px;width:40px;height:40px}
.ci-right{top:80px;right:18px;width:40px;height:40px}

/* Pixel heart on top face */
.px-heart-lg{width:24px;height:22px;background:var(--white);
  clip-path:polygon(25% 0%,50% 15%,75% 0%,100% 25%,100% 50%,50% 100%,0% 50%,0% 25%)}
/* Pixel palette on left face */
.px-palette{width:22px;height:22px;border-radius:50%;border:3px solid rgba(255,255,255,.8);position:relative}
.px-palette::before{content:'';position:absolute;top:3px;left:3px;width:5px;height:5px;background:var(--yellow);border-radius:50%}
.px-palette::after{content:'';position:absolute;bottom:3px;right:3px;width:5px;height:5px;background:var(--pink);border-radius:50%}
/* Pixel eye on right face */
.px-eye{width:22px;height:14px;background:rgba(255,255,255,.8);border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center}
.px-eye::after{content:'';width:8px;height:8px;background:var(--navy);border-radius:50%}

/* Cube shadow */
.cube-shadow{position:absolute;bottom:-8px;left:20px;right:20px;height:16px;
  background:radial-gradient(ellipse,rgba(0,0,0,.15),transparent 70%)}

/* Floating cube animation */
.cube-inner{animation:cubeFloat 3s ease-in-out infinite alternate;position:relative}
@keyframes cubeFloat{0%{transform:translateY(0)}100%{transform:translateY(-8px)}}

/* ═══ Decorative pixel elements ═══ */
.deco{position:absolute;pointer-events:none;z-index:2}
/* Orange d-pad cross */
.px-cross{width:30px;height:30px;position:relative}
.px-cross::before{content:'';position:absolute;top:10px;left:0;width:30px;height:10px;background:var(--orange);border:2px solid rgba(0,0,0,.2)}
.px-cross::after{content:'';position:absolute;top:0;left:10px;width:10px;height:30px;background:var(--orange);border:2px solid rgba(0,0,0,.2)}
/* Sparkle */
.px-spark{font-family:var(--font);color:var(--yellow);font-size:14px;animation:sparkle 2s ease-in-out infinite}
@keyframes sparkle{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
/* Red diamond */
.px-dia{width:12px;height:12px;background:var(--red);transform:rotate(45deg)}
/* Small pixel arrow */
.px-arr{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:12px solid var(--orange)}

.deco-1{top:25%;left:12px}.deco-2{top:18%;right:16px}.deco-3{bottom:32%;left:20px}
.deco-4{bottom:28%;right:14px}.deco-5{top:35%;left:50px}.deco-6{top:40%;right:40px}
.deco-7{bottom:38%;left:60px}

/* ═══ Function Buttons ═══ */
.home-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px;z-index:3}
.fbtn{padding:var(--px);position:relative;cursor:pointer}
.fbtn .pill-border{background:var(--black)}
.fbtn-inner{padding:14px 20px;font-family:var(--font);font-size:.7rem;color:var(--white);
  text-shadow:2px 2px 0 rgba(0,0,0,.25);text-align:center;position:relative;z-index:1;
  border:none;width:100%;cursor:pointer;letter-spacing:1px;
  clip-path:polygon(10px 0,calc(100% - 10px) 0,calc(100% - 10px) 2px,calc(100% - 6px) 2px,calc(100% - 6px) 4px,calc(100% - 4px) 4px,calc(100% - 4px) 6px,calc(100% - 2px) 6px,calc(100% - 2px) 10px,100% 10px,100% calc(100% - 10px),calc(100% - 2px) calc(100% - 10px),calc(100% - 2px) calc(100% - 6px),calc(100% - 4px) calc(100% - 6px),calc(100% - 4px) calc(100% - 4px),calc(100% - 6px) calc(100% - 4px),calc(100% - 6px) calc(100% - 2px),calc(100% - 10px) calc(100% - 2px),calc(100% - 10px) 100%,10px 100%,10px calc(100% - 2px),6px calc(100% - 2px),6px calc(100% - 4px),4px calc(100% - 4px),4px calc(100% - 6px),2px calc(100% - 6px),2px calc(100% - 10px),0 calc(100% - 10px),0 10px,2px 10px,2px 6px,4px 6px,4px 4px,6px 4px,6px 2px,10px 2px)}
/* Double shine */
.fbtn-inner::before{content:'';position:absolute;top:6px;left:16px;width:16px;height:5px;
  background:rgba(255,255,255,.5);clip-path:polygon(15% 0,100% 0,85% 100%,0 100%);z-index:5;pointer-events:none}
.fbtn-inner::after{content:'';position:absolute;top:6px;left:36px;width:10px;height:5px;
  background:rgba(255,255,255,.3);clip-path:polygon(15% 0,100% 0,85% 100%,0 100%);z-index:5;pointer-events:none}
.bg-orange{background:linear-gradient(180deg,var(--orange-l),var(--orange),var(--orange-d))}
.bg-yellow{background:linear-gradient(180deg,var(--yellow-l),var(--yellow),var(--yellow-d));color:var(--black)!important;text-shadow:1px 1px 0 rgba(255,255,255,.3)!important}
.bg-pink{background:linear-gradient(180deg,var(--pink-l),#F2A0B0,var(--pink-d))}
.bg-blue{background:linear-gradient(180deg,var(--blue-l),var(--blue),var(--blue-d))}
.bg-green{background:linear-gradient(180deg,var(--green-l),var(--green),var(--green-d))}
.bg-cyan{background:linear-gradient(180deg,var(--cyan-l),var(--cyan),var(--cyan-d))}
.bg-red{background:linear-gradient(180deg,var(--red-l),var(--red),var(--red-d))}

/* Button micro-animation */
.fbtn:active{transform:scale(.95)}
.fbtn:hover{transform:translateY(-2px);filter:brightness(1.05)}
.fbtn.clicked{animation:btnPop .3s ease-out}
@keyframes btnPop{0%{transform:scale(.92)}40%{transform:scale(1.04)}100%{transform:scale(1)}}

/* Home footer */
.home-ft{position:absolute;bottom:24px;left:0;right:0;text-align:center;z-index:3}
.home-ft-text{font-family:var(--font);font-size:.38rem;color:rgba(255,255,255,.4);letter-spacing:3px}

/* ═══ Sub-page styles (photo/draw/identify) ═══ */

/* Upload */
.upload-wrap{margin:0 16px;padding:var(--px);position:relative;z-index:1}
.upload-zone{background:var(--white);padding:36px 20px;text-align:center;cursor:pointer;position:relative;z-index:1;
  clip-path:polygon(6px 0,calc(100% - 6px) 0,calc(100% - 6px) 3px,calc(100% - 3px) 3px,calc(100% - 3px) 6px,100% 6px,100% calc(100% - 6px),calc(100% - 3px) calc(100% - 6px),calc(100% - 3px) calc(100% - 3px),calc(100% - 6px) calc(100% - 3px),calc(100% - 6px) 100%,6px 100%,6px calc(100% - 3px),3px calc(100% - 3px),3px calc(100% - 6px),0 calc(100% - 6px),0 6px,3px 6px,3px 3px,6px 3px)}
.upload-zone.has-img{padding:0}.upload-zone.has-img img{width:100%;display:block}
.upload-px{width:40px;height:40px;margin:0 auto 10px;background:linear-gradient(180deg,var(--cyan-l),var(--cyan),var(--cyan-d));
  border:var(--px) solid var(--black);display:flex;align-items:center;justify-content:center;
  font-family:var(--font);font-size:.8rem;color:var(--white)}
.upload-label{font-family:var(--font);font-size:.68rem;color:var(--text)}.upload-hint{font-size:.55rem;color:var(--text3);margin-top:4px}
input[type=file]{display:none}

/* Settings */
.s-wrap{margin:14px 16px 0;padding:var(--px);position:relative;z-index:1}
.s-card{background:var(--white);position:relative;z-index:1;overflow:hidden;
  clip-path:polygon(6px 0,calc(100% - 6px) 0,calc(100% - 6px) 3px,calc(100% - 3px) 3px,calc(100% - 3px) 6px,100% 6px,100% calc(100% - 6px),calc(100% - 3px) calc(100% - 6px),calc(100% - 3px) calc(100% - 3px),calc(100% - 6px) calc(100% - 3px),calc(100% - 6px) 100%,6px 100%,6px calc(100% - 3px),3px calc(100% - 3px),3px calc(100% - 6px),0 calc(100% - 6px),0 6px,3px 6px,3px 3px,6px 3px)}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px}
.s-row+.s-row{border-top:2px solid #e8f5ee}
.s-label{font-size:.72rem;color:var(--text)}
.pkr{padding:5px 14px;background:linear-gradient(180deg,var(--orange-l),var(--orange),var(--orange-d));
  border:var(--px) solid var(--black);font-family:var(--font);font-size:.52rem;color:var(--white);cursor:pointer;position:relative;text-shadow:1px 1px 0 rgba(0,0,0,.2)}
.pkr::before{content:'';position:absolute;top:3px;left:5px;width:8px;height:3px;background:rgba(255,255,255,.35)}
.pkr:active{transform:scale(.95)}
.pkr:hover{filter:brightness(1.08)}
.tgl{width:48px;height:26px;background:linear-gradient(180deg,#ddd,#ccc,#bbb);border:var(--px) solid var(--black);position:relative;cursor:pointer;transition:background .2s}
.tgl.on{background:linear-gradient(180deg,var(--green-l),var(--green),var(--green-d))}
.tgl-k{position:absolute;top:1px;left:1px;width:18px;height:18px;background:linear-gradient(180deg,#fff,#eee);border:2px solid var(--black);transition:left .15s}
.tgl.on .tgl-k{left:23px}
.seg{display:flex;border:var(--px) solid var(--black);overflow:hidden}
.seg-btn{padding:6px 12px;border:none;font-family:var(--font);font-size:.48rem;background:var(--white);color:var(--text2);cursor:pointer}
.seg-btn+.seg-btn{border-left:2px solid var(--black)}
.seg-btn.on{background:linear-gradient(180deg,var(--yellow-l),var(--yellow),var(--yellow-d));color:var(--black)}
.cl-row{display:flex;align-items:center;padding:13px 14px;cursor:pointer;border-top:2px solid #e8f5ee}
.cl-row:active{background:#f0faf5}
.cl-dots{display:flex;gap:3px;margin-right:10px}
.cl-dot{width:14px;height:14px;border:2px solid var(--black)}
.cl-text{flex:1;font-size:.65rem;color:var(--text)}
.cl-arrow{font-family:var(--font);color:var(--orange);font-size:.6rem}
.hint{padding:10px 16px;font-family:var(--font);font-size:.4rem;color:rgba(255,255,255,.35);text-align:center;position:relative;z-index:1}

/* Bottom bar */
.bbar{padding:12px 16px calc(12px + var(--safe-b));background:var(--bg-dd);border-top:var(--px) solid var(--black);flex-shrink:0;position:relative;z-index:1;box-shadow:0 -4px 12px rgba(0,0,0,.1)}
.btn-row{display:flex;gap:10px}
.pbtn{position:relative;padding:var(--px);cursor:pointer}
.pbtn .pill-border{background:var(--black)}
.pbtn-inner{padding:12px 20px;font-family:var(--font);font-size:.6rem;color:var(--white);text-shadow:1px 1px 0 rgba(0,0,0,.25);
  text-align:center;position:relative;z-index:1;border:none;width:100%;cursor:pointer;

let recentBrands=JSON.parse(localStorage.getItem('recentBrands')||'[]');
function openSheet(t){if(t==='brand')renBrand();if(t==='size')renSize();document.getElementById('sheet'+cap(t)).classList.add('show')}
function closeSheet(t){document.getElementById('sheet'+cap(t)).classList.remove('show');upUI()}
function renBrand(){
  document.getElementById('brandCurrent').textContent='当前选择: '+bdn(cBrand)+' ('+bCnt(cBrand)+'色)';
  let h='';
  if(recentBrands.length){h+='<div class="sh-section">最近使用</div><div class="sh-tags">';recentBrands.forEach(b=>{h+=bTag(b)});h+='</div>'}
  h+='<div class="sh-section">国产品牌</div><div class="sh-tags">';CN_BRANDS.forEach(b=>{h+=bTag(b)});h+='</div>';
  h+='<div class="sh-section">国际品牌</div><div class="sh-tags">';INTL_BRAND_NAMES.forEach(b=>{h+=bTag(b)});h+='</div>';
  h+='<div class="sh-tips"><div class="sh-tips-title">购买提示</div><div class="sh-tips-text">· 不同品牌的拼豆尺寸可能略有差异<br>· 建议正式制作前购买小包装测试颜色效果<br>· 大型作品建议预算充足的颜色数量<br>· 可以混用不同品牌 但要注意尺寸匹配度</div></div>';
  document.getElementById('brandBody').innerHTML=h}
function bTag(b){return`<div class="sh-tag ${b===cBrand?'sel':''}" onclick="pickB('${b}')"><span class="sh-tag-name">${bdn(b)}</span><span class="sh-tag-count">${bCnt(b)}色</span></div>`}
function renSize(){let h='<div class="sh-tags" style="padding:14px 0">';h+=SD.map(s=>{const sl=s.w===cSize.w&&s.h===cSize.h;return`<div class="sh-tag ${sl?'sel':''}" onclick="pickS(${s.w},${s.h})"><span class="sh-tag-name">${s.l} <span style="font-size:.5rem;color:var(--text3)">${s.t}</span></span><span class="sh-tag-count">${s.b}颗</span></div>`}).join('');h+='</div>';document.getElementById('sizeBody').innerHTML=h}
function pickB(b){cBrand=b;selC=new Set(allC().map(c=>c.hex));recentBrands=recentBrands.filter(x=>x!==b);recentBrands.unshift(b);if(recentBrands.length>3)recentBrands.pop();localStorage.setItem('recentBrands',JSON.stringify(recentBrands));toast(bdn(b));closeSheet('brand')}
function pickS(w,h){cSize={w,h};toast(w+'x'+h);closeSheet('size')}
function isI(b){return INTL_BRAND_NAMES.includes(b||cBrand)}
function isK(b){return(b||cBrand)==='卡卡'}
function isH(b){return(b||cBrand)==='黄豆豆'}
function allC(b){b=b||cBrand;if(isI(b))return INTL_BRANDS[b].map(c=>({hex:c.hex,code:c.code,name:c.name,group:c.code.replace(/\d+/,'')}));if(isK(b)){const a=[];for(const[g,cs]of Object.entries(KAKA_DB))cs.forEach(c=>a.push({...c,group:g}));return a}if(isH(b)){const a=[];for(const[g,cs]of Object.entries(HDD_DB))cs.forEach(c=>a.push({...c,group:g}));return a}const a=[];for(const[g,cs]of Object.entries(COLOR_DB))cs.forEach(c=>a.push({...c,group:g}));return a}
function bCnt(b){if(INTL_BRAND_NAMES.includes(b))return INTL_BRANDS[b].length;if(b==='卡卡')return Object.values(KAKA_DB).reduce((s,a)=>s+a.length,0);if(b==='黄豆豆')return Object.values(HDD_DB).reduce((s,a)=>s+a.length,0);if(['COCO','漫漫','盼盼','咪小窝'].includes(b)){let n=0;for(const cs of Object.values(COLOR_DB))for(const c of cs)if(c[b])n++;return n}return Object.values(COLOR_DB).reduce((s,a)=>s+a.length,0)}
function bdn(b){const m={'Artkal_S':'Artkal S','Artkal_C':'Artkal C','Artkal_A':'Artkal A','Artkal_M':'Artkal M','Artkal_R':'Artkal R','Diamond_Dotz':'Diamond Dotz','Perler_Mini':'Perler Mini','Perler_Caps':'Perler Caps','Hama_Mini':'Hama Mini','Hama_Maxi':'Hama Maxi'};return m[b]||b}
function upUI(){document.getElementById('valBrand').textContent=bdn(cBrand);const s=SD.find(s=>s.w===cSize.w&&s.h===cSize.h);document.getElementById('valSize').textContent=s?s.l:`${cSize.w}x${cSize.h}`;const tot=allC().length,n=selC.size;document.getElementById('valColors').textContent=n===tot?`全部 ${tot} 色`:`已选 ${n}/${tot}`;document.getElementById('colorDots').innerHTML=allC().slice(0,5).map(c=>`<div class="cl-dot" style="background:${c.hex}"></div>`).join('');document.getElementById('btnGen').disabled=!srcImg}
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])ldImg(e.target.files[0])});
function ldImg(f){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{srcImg=img;const z=document.getElementById('uploadZone');z.classList.add('has-img');z.innerHTML=`<img src="${e.target.result}">`;z.onclick=()=>document.getElementById('fileInput').click();upUI();toast('LOADED')};img.src=e.target.result};r.readAsDataURL(f)}
function setMode(m,el){exMode=m;el.parentElement.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on')}
function startGen(){if(!srcImg||!selC.size)return;const b=document.getElementById('btnGen');b.disabled=true;b.textContent='LOADING...';setTimeout(()=>{genPat();b.disabled=false;b.textContent='START'},100)}
function renCP(){const body=document.getElementById('colorBody');let h='';if(isI()){const gs={};for(const c of INTL_BRANDS[cBrand]){const p=c.code.replace(/\d+/g,'');if(!gs[p])gs[p]=[];gs[p].push(c)}for(const[p,g]of Object.entries(gs)){h+=`<div class="c-group">${p} (${g.length})</div><div class="c-grid">`;for(const c of g)h+=ccH(c.hex,c.code);h+='</div>'}}else if(isH()){for(const[g,cs]of Object.entries(HDD_DB)){if(!cs?.length)continue;h+=`<div class="c-group">${GN[g]||g} (${cs.length})</div><div class="c-grid">`;for(const c of cs)h+=ccH(c.hex,c.code);h+='</div>'}}else if(isK()){for(const[g,cs]of Object.entries(KAKA_DB)){if(!cs?.length)continue;h+=`<div class="c-group">卡卡 (${cs.length})</div><div class="c-grid">`;for(const c of cs)h+=ccH(c.hex,c.code,c.type);h+='</div>'}}else{const ord='Z A B C D E F G H M P Q R T Y ZG'.split(' '),gs=Object.keys(COLOR_DB).sort((a,b)=>ord.indexOf(a)-ord.indexOf(b));for(const g of gs){const cs=COLOR_DB[g];if(!cs?.length)continue;h+=`<div class="c-group">${GN[g]||g} (${cs.length})</div><div class="c-grid">`;for(const c of cs){const code=c[cBrand]||c.MARD;if(!code)continue;h+=ccH(c.hex,code,c.type)}h+='</div>'}}body.innerHTML=h;upCC()}
function ccH(hex,code,type){const tt=tTag(type);return`<div class="c-wrap"><div class="c-cell ${selC.has(hex)?'sel':''}" style="background:${hex}" onclick="togC('${hex}')"><div class="ck">✓</div></div><div class="c-code">${code}${tt}</div></div>`}
function tTag(t){if(!t||t==='normal')return'';const m={transparent:'透',glow:'夜',pearlescent:'珠',light:'光',temperatrue:'温'};return m[t]?' '+m[t]:''}
function togC(hex){if(selC.has(hex))selC.delete(hex);else selC.add(hex);document.querySelectorAll('.c-cell').forEach(el=>{if(el.style.background===hex||rgbM(el.style.background,hex))el.classList.toggle('sel',selC.has(hex))});upCC()}
function rgbM(rgb,hex){if(!hex)return false;const[r,g,b]=hRgb(hex);return rgb.includes(`${r}, ${g}, ${b}`)}
function selAll(){allC().forEach(c=>selC.add(c.hex));renCP();toast('ALL')}
function clrAll(){selC.clear();renCP();toast('CLEAR')}
function upCC(){document.getElementById('cInfo').textContent=`${selC.size}/${allC().length}`}
function hRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function r2l([r,g,b]){let rl=r/255,gl=g/255,bl=b/255;rl=rl>.04045?((rl+.055)/1.055)**2.4:rl/12.92;gl=gl>.04045?((gl+.055)/1.055)**2.4:gl/12.92;bl=bl>.04045?((bl+.055)/1.055)**2.4:bl/12.92;let x=(rl*.4124564+gl*.3575761+bl*.1804375)/.95047,y=rl*.2126729+gl*.7151522+bl*.0721750,z=(rl*.0193339+gl*.1191920+bl*.9503041)/1.08883;const f=v=>v>.008856?Math.cbrt(v):7.787*v+16/116;return[116*f(y)-16,500*(f(x)-f(y)),200*(f(y)-f(z))]}
function dE(a,b){return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2)}
function closest(rgb,pal){const lab=r2l(rgb);let best=null,bd=Infinity;for(const c of pal){const d=dE(lab,c.lab);if(d<bd){bd=d;best=c}}return{...best,delta:bd}}
function genPat(){if(!srcImg||!selC.size)return;const all=allC(),pal=all.filter(c=>selC.has(c.hex)).map(c=>({...c,code:isI()?c.code:isK()?c.code:isH()?c.code:(c[cBrand]||c.MARD),rgb:hRgb(c.hex),lab:r2l(hRgb(c.hex))}));const{w,h}=cSize,tmp=document.createElement('canvas');if(exMode==='block'){const bs=4;tmp.width=w*bs;tmp.height=h*bs;const tc=tmp.getContext('2d');tc.drawImage(srcImg,0,0,tmp.width,tmp.height);const hi=tc.getImageData(0,0,tmp.width,tmp.height).data;bRes=[];for(let y=0;y<h;y++){const row=[];for(let x=0;x<w;x++){let rr=0,gg=0,bb=0,aa=0,cn=0;for(let by=0;by<bs;by++)for(let bx=0;bx<bs;bx++){const px=(y*bs+by)*tmp.width+(x*bs+bx),i=px*4;rr+=hi[i];gg+=hi[i+1];bb+=hi[i+2];aa+=hi[i+3];cn++}if(aa/cn<128&&!fillBg){row.push(null);continue}row.push(closest([Math.round(rr/cn),Math.round(gg/cn),Math.round(bb/cn)],pal))}bRes.push(row)}}else{tmp.width=w;tmp.height=h;const tc=tmp.getContext('2d');tc.drawImage(srcImg,0,0,w,h);const dt=tc.getImageData(0,0,w,h).data;bRes=[];for(let y=0;y<h;y++){const row=[];for(let x=0;x<w;x++){const i=(y*w+x)*4;if(dt[i+3]<128&&!fillBg){row.push(null);continue}row.push(closest([dt[i],dt[i+1],dt[i+2]],pal))}bRes.push(row)}}if(fillBg){const cn={};for(const row of bRes)for(const b of row)if(b)cn[b.hex]=(cn[b.hex]||0)+1;let bh=null,mx=0;for(const[hex,c]of Object.entries(cn))if(c>mx){mx=c;bh=hex}if(bh){const bg=pal.find(c=>c.hex===bh);if(bg)for(let y=0;y<bRes.length;y++)for(let x=0;x<bRes[0].length;x++)if(!bRes[y][x])bRes[y][x]={...bg}}}nav('result')}
function renRes(){if(!bRes)return;const cv=document.getElementById('beadCv'),ctx=cv.getContext('2d');const h=bRes.length,w=bRes[0].length,wr=document.getElementById('rWrap'),mW=wr.clientWidth-32,s=Math.max(4,Math.floor(Math.min(mW/w,14)));cv.width=w*s;cv.height=h*s;ctx.fillStyle='#eaf5ec';ctx.fillRect(0,0,cv.width,cv.height);for(let y=0;y<h;y++)for(let x=0;x<w;x++){const b=bRes[y][x],px=x*s,py=y*s;if(vMode==='round'){ctx.fillStyle='#b8d8ba';ctx.beginPath();ctx.arc(px+s/2,py+s/2,s*.1,0,Math.PI*2);ctx.fill();if(b){ctx.fillStyle=b.hex;ctx.beginPath();ctx.arc(px+s/2,py+s/2,s*.42,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.arc(px+s/2-s*.1,py+s/2-s*.1,s*.12,0,Math.PI*2);ctx.fill()}}else if(vMode==='pixel'){if(b){ctx.fillStyle=b.hex;ctx.fillRect(px,py,s,s)}}else{if(b){ctx.fillStyle=b.hex;ctx.fillRect(px+.5,py+.5,s-1,s-1)}}}if(vMode==='grid'){ctx.strokeStyle='rgba(60,100,60,.12)';ctx.lineWidth=.5;for(let x=0;x<=w;x++){ctx.beginPath();ctx.moveTo(x*s,0);ctx.lineTo(x*s,cv.height);ctx.stroke()}for(let y=0;y<=h;y++){ctx.beginPath();ctx.moveTo(0,y*s);ctx.lineTo(cv.width,y*s);ctx.stroke()}}}
function setV(m,el){vMode=m;document.querySelectorAll('.r-btn[data-v]').forEach(b=>b.classList.remove('on'));el.classList.add('on');renRes()}
function togSt(){const sp=document.getElementById('stPanel'),cw=document.getElementById('rWrap');if(sp.style.display==='none'){sp.style.display='block';cw.style.display='none'}else{sp.style.display='none';cw.style.display='flex'}}
function bldSt(){if(!bRes)return;const cn={};let tot=0;for(const row of bRes)for(const b of row){if(!b)continue;if(!cn[b.hex])cn[b.hex]={...b,count:0};cn[b.hex].count++;tot++}const st=Object.values(cn).sort((a,b)=>b.count-a.count);let h=`<div class="st-head">${bdn(cBrand)}</div>`;h+=st.map(c=>`<div class="st-row"><div class="st-sw" style="background:${c.hex}"></div><div class="st-info"><div class="st-name">${c.code}</div><div class="st-code">${c.hex}</div></div><div class="st-n">${c.count}</div></div>`).join('');h+=`<div class="st-total"><span>TOTAL</span><span>${tot}</span></div>`;document.getElementById('stPanel').innerHTML=h}
function expCv(id){const c=document.getElementById(id),a=document.createElement('a');a.download='bead-pattern.png';a.href=c.toDataURL('image/png');a.click();toast('SAVED')}
function initDraw(){dN=parseInt(document.getElementById('drawSizeSel').value);dGrid=Array.from({length:dN},()=>Array(dN).fill(null));const picks=[];const gs=['F','A','B','C','D','E','G','H','M','P','Q','R'];for(const g of gs){if(COLOR_DB[g])picks.push(...COLOR_DB[g])}document.getElementById('drawPal').innerHTML=`<div class="d-er ${dErase?'on':''}" onclick="setEr()">X</div>`+picks.map(c=>`<div class="d-sw ${!dErase&&dCol===c.hex?'on':''}" style="background:${c.hex}" onclick="setDC('${c.hex}')" title="${c.MARD||c.code||''}"></div>`).join('');if(!dCol&&picks.length)dCol=picks[0].hex;renDraw();const cv=document.getElementById('drawCv');let dr=false;const cell=e=>{const r=cv.getBoundingClientRect();const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;const s=cv.width/dN;return{x:Math.max(0,Math.min(dN-1,Math.floor((cx-r.left)*(cv.width/r.width)/s))),y:Math.max(0,Math.min(dN-1,Math.floor((cy-r.top)*(cv.height/r.height)/s)))}};const paint=e=>{const{x,y}=cell(e);dGrid[y][x]=dErase?null:dCol;renDraw()};cv.onmousedown=cv.ontouchstart=e=>{e.preventDefault();dr=true;paint(e)};cv.onmousemove=cv.ontouchmove=e=>{if(dr){e.preventDefault();paint(e)}};cv.onmouseup=cv.ontouchend=()=>dr=false;cv.onmouseleave=()=>dr=false}
function setDC(hex){dCol=hex;dErase=false;rfDP()}
function setEr(){dErase=true;rfDP()}
function rfDP(){document.querySelectorAll('.d-sw').forEach(el=>{el.classList.toggle('on',!dErase&&el.style.background&&rgbM(el.style.background,dCol))});document.querySelector('.d-er')?.classList.toggle('on',dErase)}
function renDraw(){const cv=document.getElementById('drawCv'),ctx=cv.getContext('2d'),wr=cv.parentElement,mW=wr.clientWidth-32;const s=Math.max(6,Math.floor(mW/dN));cv.width=dN*s;cv.height=dN*s;ctx.fillStyle='#eaf5ec';ctx.fillRect(0,0,cv.width,cv.height);for(let y=0;y<dN;y++)for(let x=0;x<dN;x++){const px=x*s,py=y*s;ctx.fillStyle='#b8d8ba';ctx.beginPath();ctx.arc(px+s/2,py+s/2,s*.1,0,Math.PI*2);ctx.fill();if(dGrid[y][x]){ctx.fillStyle=dGrid[y][x];ctx.beginPath();ctx.arc(px+s/2,py+s/2,s*.42,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.arc(px+s/2-s*.1,py+s/2-s*.1,s*.12,0,Math.PI*2);ctx.fill()}}ctx.strokeStyle='rgba(60,100,60,.08)';ctx.lineWidth=.5;for(let i=0;i<=dN;i++){ctx.beginPath();ctx.moveTo(i*s,0);ctx.lineTo(i*s,cv.height);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*s);ctx.lineTo(cv.width,i*s);ctx.stroke()}}
function clrDraw(){dGrid=Array.from({length:dN},()=>Array(dN).fill(null));renDraw();toast('CLEAR')}
document.getElementById('idFI').addEventListener('change',e=>{if(e.target.files[0])ldIdImg(e.target.files[0])});
function ldIdImg(f){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const cv=document.getElementById('idCanvas');cv.style.display='block';const mW=cv.parentElement.clientWidth-32,sc=Math.min(mW/img.width,1);cv.width=img.width*sc;cv.height=img.height*sc;cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);document.getElementById('idUpZ').style.display='none';toast('TAP TO PICK')};img.src=e.target.result};r.readAsDataURL(f)}
document.getElementById('idCanvas').addEventListener('click',e=>{const cv=document.getElementById('idCanvas'),ctx=cv.getContext('2d'),r=cv.getBoundingClientRect();const x=Math.floor((e.clientX-r.left)*(cv.width/r.width)),y=Math.floor((e.clientY-r.top)*(cv.height/r.height));const px=ctx.getImageData(x,y,1,1).data,rgb=[px[0],px[1],px[2]];const hex='#'+rgb.map(v=>v.toString(16).padStart(2,'0')).join(''),lab=r2l(rgb);const ms=[];for(const[g,cs]of Object.entries(COLOR_DB))for(const c of cs){const d=dE(lab,r2l(hRgb(c.hex)));for(const br of CN_BRANDS){if(br==='卡卡')continue;if(c[br])ms.push({hex:c.hex,code:c[br],brand:br,delta:d})}}for(const[g,cs]of Object.entries(KAKA_DB))for(const c of cs)ms.push({hex:c.hex,code:c.code,brand:'卡卡',delta:dE(lab,r2l(hRgb(c.hex)))});
for(const[g,cs]of Object.entries(HDD_DB))for(const c of cs)ms.push({hex:c.hex,code:c.code,brand:'黄豆豆',delta:dE(lab,r2l(hRgb(c.hex)))});for(const[br,cs]of Object.entries(INTL_BRANDS))for(const c of cs)ms.push({hex:c.hex,code:c.code,brand:bdn(br),delta:dE(lab,r2l(hRgb(c.hex)))});ms.sort((a,b)=>a.delta-b.delta);const seen=new Set(),top=[];for(const m of ms){if(!seen.has(m.brand)){seen.add(m.brand);top.push(m)}if(top.length>=9)break}document.getElementById('idResult').innerHTML=`<div class="id-picked-wrap"><div class="rect-border"></div><div class="id-picked"><div class="id-sw" style="background:${hex}"></div><div><div class="id-hex">${hex.toUpperCase()}</div><div class="id-rgb">RGB(${rgb.join(',')})</div></div></div></div><div class="m-title">MATCH RESULT</div><div class="m-wrap">${top.map(m=>`<div class="m-row"><div class="m-sw" style="background:${m.hex}"></div><div class="m-info"><div class="m-name">${m.code}</div><div class="m-brand">${m.brand}</div></div><div class="m-de">ΔE ${m.delta.toFixed(1)}</div></div>`).join('')}</div>`});
selC=new Set(allC().map(c=>c.hex));upUI();
</script>
